name: deploy-production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test-api:
    name: test-api
    runs-on: ubuntu-latest

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Thiết lập Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Chạy kiểm thử backend
        working-directory: apps/api
        run: mvn -B test

  build-api:
    name: build-api
    runs-on: ubuntu-latest

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Thiết lập Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Biên dịch backend
        working-directory: apps/api
        run: mvn -B -DskipTests package

  test-web:
    name: test-web
    runs-on: ubuntu-latest

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Thiết lập Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cài dependency
        run: npm ci

      - name: Chạy kiểm thử web
        working-directory: apps/web
        run: npm exec vitest -- --configLoader runner --run

  build-web:
    name: build-web
    runs-on: ubuntu-latest

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Thiết lập Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cài dependency
        run: npm ci

      - name: Biên dịch web
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_BASE_URL: https://api.airplane.id.vn
        run: npm run build

  validate-production-config:
    name: validate-production-config
    runs-on: ubuntu-latest

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Thiết lập Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cài dependency
        run: npm ci

      - name: Kiểm tra cấu hình production
        shell: pwsh
        run: ./infra/scripts/kiem-tra-san-sang-production.ps1

  publish-images:
    name: publish-images
    runs-on: ubuntu-latest
    needs:
      - test-api
      - test-web
      - build-api
      - build-web
      - validate-production-config
    outputs:
      api_image: ${{ steps.image-meta.outputs.api_image }}
      sha_tag: ${{ steps.image-meta.outputs.sha_tag }}
      web_image: ${{ steps.image-meta.outputs.web_image }}

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Chuẩn bị tên image
        id: image-meta
        shell: bash
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo="$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          echo "web_image=ghcr.io/${owner}/${repo}-web" >> "$GITHUB_OUTPUT"
          echo "api_image=ghcr.io/${owner}/${repo}-api" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Thiết lập Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Đăng nhập GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build và đẩy image web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          provenance: false
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://api.airplane.id.vn
          tags: |
            ${{ steps.image-meta.outputs.web_image }}:main
            ${{ steps.image-meta.outputs.web_image }}:${{ steps.image-meta.outputs.sha_tag }}

      - name: Build và đẩy image api
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          file: apps/api/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ steps.image-meta.outputs.api_image }}:main
            ${{ steps.image-meta.outputs.api_image }}:${{ steps.image-meta.outputs.sha_tag }}

      - name: Ghi tóm tắt image production
        shell: bash
        run: |
          {
            echo "## Image production"
            echo "- Web: \`${{ steps.image-meta.outputs.web_image }}:main\`"
            echo "- Web theo commit: \`${{ steps.image-meta.outputs.web_image }}:${{ steps.image-meta.outputs.sha_tag }}\`"
            echo "- API: \`${{ steps.image-meta.outputs.api_image }}:main\`"
            echo "- API theo commit: \`${{ steps.image-meta.outputs.api_image }}:${{ steps.image-meta.outputs.sha_tag }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  trigger-coolify-image-deploy:
    name: trigger-coolify-image-deploy
    runs-on: ubuntu-latest
    needs:
      - publish-images

    steps:
      - name: Gọi webhook Coolify cho image nếu đã cấu hình
        shell: bash
        env:
          API_WEBHOOK: ${{ secrets.COOLIFY_API_PRODUCTION_WEBHOOK_URL }}
          WEB_WEBHOOK: ${{ secrets.COOLIFY_WEB_PRODUCTION_WEBHOOK_URL }}
        run: |
          da_goi=0

          if [ -n "$WEB_WEBHOOK" ]; then
            curl -fsS -X POST "$WEB_WEBHOOK"
            da_goi=1
          fi

          if [ -n "$API_WEBHOOK" ]; then
            curl -fsS -X POST "$API_WEBHOOK"
            da_goi=1
          fi

          if [ "$da_goi" -eq 0 ]; then
            echo "Chưa cấu hình webhook image trên GitHub Secrets, bỏ qua bước redeploy Coolify."
          fi
